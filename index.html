<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>HOCA MOBİLYA • Hızlı Kamera</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/@zxing/browser@latest"></script>
</head>
<body>
  <main class="scanner-shell">
    <header><div><span>HOCA MOBİLYA</span><h1>Hızlı Stok Kamerası</h1></div><div id="connectionBadge" class="badge waiting">Uygulama bekleniyor</div></header>
    <section class="camera-card">
      <div class="camera-wrap"><video id="cameraVideo" playsinline muted autoplay></video><div class="guide"><i></i></div><div id="cameraStatus" class="status">Kamera hazırlanıyor...</div></div>
      <div class="controls"><select id="cameraSelect"><option value="">Arka kamera (otomatik)</option></select><select id="cooldownSelect"><option value="1200">1,2 saniye</option><option value="1400" selected>1,4 saniye</option><option value="1800">1,8 saniye</option></select><button id="torchButton" disabled>Fener</button><button id="restartButton">Kamerayı Yenile</button></div>
    </section>
    <section class="result-grid"><article><span>Son barkod</span><strong id="lastBarcode">-</strong></article><article><span>Son işlem</span><strong id="lastResult">Hazırlanıyor</strong></article><article><span>Başarılı giriş</span><strong id="successCount">0</strong></article></section>
    <section class="manual"><input id="manualBarcode" inputmode="numeric" placeholder="Manuel barkod / el terminali"><button id="manualButton">STOK +1</button></section>
    <section class="recent"><h2>Son işlemler</h2><div id="recentList" class="recent-list"><p>Henüz işlem yok.</p></div></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
